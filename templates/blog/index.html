{% extends "home/base.html" %}

{% block content %}
    {% include 'blog/menu.html' %}

    {% if object_list %}
        {% for post in object_list %}
            <p><a href="{% url 'blog:detail' post.id %}">{{post.title}} : {{post.author}}</a></p>
        {% endfor %}
    {% else %}
        <p>There is no post</p>
    {% endif %}

{% endblock %}
